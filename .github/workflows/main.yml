name: Gemini_Auto_Process
on: 
  workflow_dispatch:

jobs:
  procesar:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Descarga y Fix (Gemini Mode)
        run: |
          pip install gdown
          gdown https://drive.google.com/uc?id=1ZUzXrJ1dUU_5cQzyOO6-y-oH_wEpJlda
          unzip grabpack_in_godot.zip
          
          # Busco el proyecto por ti
          PRJ=$(find . -name "project.godot" -exec dirname {} \;)
          
          # Escribo la config por ti
          cat <<EOF > "$PRJ/export_presets.cfg"
[preset.0]
name="Android"
platform="Android"
runnable=true
package/unique_name="com.gemini.fix"
package/name="Grabpack"
package/signed=false
EOF
          echo "RUTA=$PRJ" >> $GITHUB_ENV

      - name: 3. Exportar APK
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          relative_project_path: ${{ env.RUTA }}
          archive_output: true
